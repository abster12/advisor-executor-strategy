# Example configuration for advisor-executor-poc.
# Copy to ~/.config/aepoc/config.yaml or pass via --config.

models:
  advisor:
    provider: mock
    model: advisor-mock
    temperature: 0.3
  executor:
    provider: mock
    model: executor-mock
    temperature: 0.1

# Uncomment to use real providers (requires env vars / API keys):
